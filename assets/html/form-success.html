<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messaggio inviato | Loris Battaglini</title>
  <meta name="description" content="Conferma di invio del form di contatto.">
  <style>
    html.theme-dark,
    html.theme-dark body {
      background: #070f1d;
      color: #f2f7ff;
    }
  </style>
  <script src="../js/theme-preload.js"></script>
  <link rel="icon" type="image/png" href="../img/favicon/favicon_io/favicon-32x32.png">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .success-actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.7rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .success-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 220px;
      min-height: 44px;
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid transparent;
    }

    .success-btn-primary {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: #fff;
    }

    .success-btn-secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--line-strong);
    }
  </style>
</head>
<body>
  <canvas id="universe-canvas" class="universe-canvas" aria-hidden="true"></canvas>
  <main class="site-shell" style="min-height: 100vh; place-content: center;">
    <section class="about-card" style="max-width: 720px; margin: 0 auto; text-align: center;">
      <h1 style="margin-top: 0;" data-success-key="heading">Form inviato con successo.</h1>
      <p style="margin: 0.6rem 0 0;" data-success-key="lineOne">Ti rispondo via email entro 24 ore.</p>
      <p style="margin: 0.35rem 0 0;" data-success-key="lineTwo">Se il progetto e adatto, possiamo sentirci in una breve call.</p>
      <div class="success-actions">
        <a href="../../index.html#form" class="success-btn success-btn-primary" data-success-key="sendAnother">Invia un altro messaggio</a>
        <a href="../../index.html" class="success-btn success-btn-secondary" data-success-key="backHome">Torna alla home</a>
      </div>
    </section>
  </main>

  <script src="../js/form-success.js"></script>
</body>
</html>

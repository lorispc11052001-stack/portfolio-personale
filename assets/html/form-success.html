<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messaggio inviato | Loris Battaglini</title>
  <meta name="description" content="Conferma di invio del form di contatto.">
  <link rel="icon" type="image/png" href="../img/favicon/favicon_io/favicon-32x32.png">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .success-actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.7rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .success-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 220px;
      min-height: 44px;
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid transparent;
    }

    .success-btn-primary {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: #fff;
    }

    .success-btn-secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--line-strong);
    }
  </style>
</head>
<body>
  <main class="site-shell" style="min-height: 100vh; place-content: center;">
    <section class="about-card" style="max-width: 720px; margin: 0 auto; text-align: center;">
      <h1 style="margin-top: 0;" data-success-key="heading">Form inviato con successo.</h1>
      <p style="margin: 0.6rem 0 0;" data-success-key="lineOne">Ti rispondo via email entro 24 ore.</p>
      <p style="margin: 0.35rem 0 0;" data-success-key="lineTwo">Se il progetto e adatto, possiamo sentirci in una breve call.</p>
      <div class="success-actions">
        <a href="../../index.html#form" class="success-btn success-btn-primary" data-success-key="sendAnother">Invia un altro messaggio</a>
        <a href="../../index.html" class="success-btn success-btn-secondary" data-success-key="backHome">Torna alla home</a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const STORAGE_KEY = 'lb-language';
      const DEFAULT_LANGUAGE = 'it';
      const SUPPORTED_LANGUAGES = ['it', 'en'];
      const COPY = {
        it: {
          pageTitle: 'Messaggio inviato | Loris Battaglini',
          metaDescription: 'Conferma di invio del form di contatto.',
          heading: 'Richiesta inviata con successo!',
          lineOne: 'Controlla la tua casella di posta: ti ho inviato un\'email di conferma. Se non la vedi, prova a dare un\'occhiata alla cartella spam o promozioni.',
          lineTwo: 'Ti risponderò personalmente entro 24 ore!',
          sendAnother: 'Invia un altro messaggio',
          backHome: 'Torna alla home'
        },
        en: {
          pageTitle: 'Message sent | Loris Battaglini',
          metaDescription: 'Confirmation that your contact form was sent.',
          heading: 'Message sent successfully!',
          lineOne: 'Thank you for reaching out. Please check your inbox for a confirmation email. If you don\'t see it, be sure to peek into your spam or promotions folder!',
          lineTwo: 'I\'ll get back to you personally within 24 hours!',
          sendAnother: 'Send another message',
          backHome: 'Back to home'
        }
      };

      function getLanguage() {
        try {
          const storedLanguage = localStorage.getItem(STORAGE_KEY);
          return SUPPORTED_LANGUAGES.includes(storedLanguage) ? storedLanguage : DEFAULT_LANGUAGE;
        } catch (error) {
          return DEFAULT_LANGUAGE;
        }
      }

      function applyLanguage(language) {
        const copy = COPY[language] || COPY.it;
        document.documentElement.lang = language;
        document.title = copy.pageTitle;

        const descriptionMeta = document.querySelector('meta[name="description"]');
        if (descriptionMeta) {
          descriptionMeta.setAttribute('content', copy.metaDescription);
        }

        const i18nNodes = document.querySelectorAll('[data-success-key]');
        i18nNodes.forEach(function (node) {
          const key = node.getAttribute('data-success-key');
          if (!key || !Object.prototype.hasOwnProperty.call(copy, key)) return;
          node.textContent = copy[key];
        });
      }

      applyLanguage(getLanguage());
    })();
  </script>
</body>
</html>
